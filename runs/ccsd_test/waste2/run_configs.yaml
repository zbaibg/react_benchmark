run35:
  name: M052X aug-cc-pVTZ D3ZERO RIJCOSX AutoAux TIGHTSCF DEFGRID3 PCDTrimAuxJ NoAutoStart
  comment: Use M052X aug-cc-pVTZ D3ZERO RIJCOSX AutoAux TIGHTSCF DEFGRID3 PCDTrimAuxJ NoAutoStart
  qm_level: "-"
  DFTBPLUS_hcorrection: 0
  mol_mask: ":*"
  open_qm_min: true
  open_qm_min_wat: true
  water_model: spce
  DFTBPLUS_mdftb: false
  DFTBPLUS_mdftb_scale: false
  DFTBPLUS_skroot: ""
  qm_theory: EXTERN
  XTB_mm_hardness: 0
  core_number: 16
  min_maxcyc: 1
  use_amber_interface: true
  orca_template: |
    !  D3ZERO RIJCOSX TIGHTSCF DEFGRID3 PrintBasis NoAutoStart
    %basis
      Basis "aug-cc-pVTZ"
      AuxJ  "AutoAux"
      PCDTrimAuxJ  Coulomb # Trim the AuxJ basis in the Coulomb metric
      PCDThresh    -1      # Threshold for the PCD: chosen automatically if <0
    end
    %maxcore 6000
    %method 
      method      dft
      exchange    hyb_mgga_x_m05_2x
      correlation mgga_c_m05_2x
      D3S6     1.000
      D3RS6    1.417
      D3S8     0.000
      D3alpha6 14
    end
    %pal
        nprocs 16
    end

run36:
  name: CCSD(T) aug-cc-pVTZ EXTREMESCF Thresh=1e-16 TCut=1e-16 NoAutoStart
  comment: CCSD(T) aug-cc-pVTZ EXTREMESCF Thresh=1e-16 TCut=1e-16 NoAutoStart
  qm_level: "-"
  DFTBPLUS_hcorrection: 0
  mol_mask: ":*"
  open_qm_min: true
  open_qm_min_wat: true
  water_model: spce
  DFTBPLUS_mdftb: false
  DFTBPLUS_mdftb_scale: false
  DFTBPLUS_skroot: ""
  qm_theory: EXTERN
  XTB_mm_hardness: 0
  core_number: 32
  min_maxcyc: 1
  orca_template: |
    ! CCSD(T) aug-cc-pVTZ EXTREMESCF NoAutoStart
    %scf
      Thresh 1e-16
      TCut   1e-18
    end
    %pal
        nprocs 32
    end
