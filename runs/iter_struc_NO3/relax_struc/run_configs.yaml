ref_qmrun_to_minimize: run41

# distribute_tasks.py: worker limits and Slurm cpus-per-task (optional; script defaults match)
distribute_tasks:
  max_qm_workers: 40
  max_other_workers: 300
  qm_cpus_per_task: 16
  other_cpus_per_task: 1

expand_nh_oh_radius: false
# zif_meoh_assign_name: strip spurious H–H and long O–H from guess_bonds (workflow passes this through)
delete_wrong_bonds: true

